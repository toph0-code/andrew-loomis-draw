plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle plugin must be applied after the Android plugins
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.sketchsteps.loomisdraw"
    compileSdk 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId "com.sketchsteps.loomisdraw"
        // minSdk 21 supports over 98%+ of active Android devices globally
        minSdk 21
        targetSdk 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            // Signing configurations can be managed straight from Codemagic's dashboard
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    // Standard native components required by Flutter apps
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
}
