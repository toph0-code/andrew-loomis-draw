# codemagic.yaml
workflows:
  android-production-build:
    name: Flutter Android Production Build
    max_build_duration: 30
    instance_type: mac_mini_m2 # High-performance runner
    
    environment:
      flutter: stable # Automatically fetches the latest stable Flutter SDK
      groups:
        - api_credentials # Optional: Matches your environment group in Codemagic UI
        
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true

    scripts:
      - name: Set up local properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/android/local.properties"
          
      - name: Get Flutter packages
        script: |
          flutter packages pub get
          
      - name: Build Android APK
        script: |
          flutter build apk --release --no-tree-shake-icons

    artifacts:
      - build/app/outputs/flutter-apk/*-release.apk

    publishing:
      email:
        recipients:
          - your-email@example.com # Replace with your email to receive the build
        notify:
          success: true
          failure: true
